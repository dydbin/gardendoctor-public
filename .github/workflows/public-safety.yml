name: Public safety

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  public-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Scan committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
      - name: Check public tree
        run: ./scripts/check-public-tree.sh
      - name: Test centralized load-test gate
        run: python3 -m unittest discover -s infra/loadtest/tests
