name: Mobile CI

on:
  pull_request:
    paths:
      - apps/mobile/**
      - infra/.env.example
      - infra/Makefile
      - infra/scripts/render-mobile-config.py
      - .github/workflows/mobile-ci.yml
  push:
    branches: [main]
    paths:
      - apps/mobile/**
      - infra/.env.example
      - infra/Makefile
      - infra/scripts/render-mobile-config.py
      - .github/workflows/mobile-ci.yml

permissions:
  contents: read

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.21.0
        with:
          flutter-version: 3.32.0
          channel: stable
          cache: true
      - name: Restore locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Generate sources
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Validate infra env to mobile config projection
        working-directory: .
        run: python3 infra/scripts/render-mobile-config.py --env-file infra/.env.example --output /tmp/app.local.json
      - name: Check generated sources
        run: git diff --exit-code -- lib
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: Test
        run: flutter test
      - name: Build public debug APK
        run: flutter build apk --debug --dart-define-from-file=../../infra/config/mobile/public.json
