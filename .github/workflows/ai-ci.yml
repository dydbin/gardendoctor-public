name: AI CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - services/ai/**
      - infra/**
      - scripts/check-python-syntax.sh
      - .github/workflows/ai-ci.yml
  push:
    branches: [main]
    paths:
      - services/ai/**
      - infra/**
      - scripts/check-python-syntax.sh
      - .github/workflows/ai-ci.yml

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - name: Check Python syntax
        run: ./scripts/check-python-syntax.sh
      - name: Validate Compose
        run: docker compose --env-file infra/.env.example -f infra/compose.yaml config -q

  container-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build AI image
        run: docker compose --env-file infra/.env.example -f infra/compose.yaml build ai
      - name: Start AI service
        run: docker compose --env-file infra/.env.example -f infra/compose.yaml up -d ai
      - name: Smoke test degraded mode
        run: ./infra/scripts/smoke-ai.sh
      - name: Show container logs on failure
        if: failure()
        run: docker compose --env-file infra/.env.example -f infra/compose.yaml logs --no-color ai
      - name: Stop AI service
        if: always()
        run: docker compose --env-file infra/.env.example -f infra/compose.yaml down -v
