# @ActiveProfiles({"test", "integration"})를 사용하는 통합 테스트에서
# application-test.properties와 함께 로드됩니다. 실제 로컬 Docker MySQL/Redis를
# 바라보는 테스트 profile입니다.

# 통합 테스트는 Docker가 호스트에 노출한 포트를 사용합니다. password에는 의도적으로
# fallback을 두지 않아서 로컬 DB 비밀번호가 없으면 테스트가 바로 실패합니다.
spring.datasource.url=${INTEGRATION_DATASOURCE_URL:jdbc:mysql://localhost:3307/${INTEGRATION_MYSQL_DATABASE:gardendoctor}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true}
spring.datasource.username=${INTEGRATION_DATASOURCE_USERNAME:gardendoctor}
spring.datasource.password=${INTEGRATION_DATASOURCE_PASSWORD}
spring.datasource.hikari.connection-timeout=1500
spring.datasource.hikari.validation-timeout=1000

# 실제 외부 Redis 연결을 확인하는 테스트에서 사용하는 Redis endpoint입니다.
spring.data.redis.host=${INTEGRATION_REDIS_HOST:localhost}
spring.data.redis.port=${INTEGRATION_REDIS_PORT:6379}

# 포트폴리오 진단 테스트에서 Hibernate query 통계를 보기 위해 켭니다.
spring.jpa.properties.hibernate.generate_statistics=true

# 기본은 기존 스키마를 보호하기 위해 none입니다. 스키마 변경이 포함된 진단 검증에서는
# INTEGRATION_JPA_HIBERNATE_DDL_AUTO=update로 명시적으로 켭니다.
spring.jpa.hibernate.ddl-auto=${INTEGRATION_JPA_HIBERNATE_DDL_AUTO:none}
