# 일반 Spring 테스트용 기본 test profile입니다.
# 통합 테스트는 이 파일 위에 application-integration.properties를 추가로 로드합니다.
spring.main.lazy-initialization=true

# 단위 테스트나 slice 성격의 Spring 테스트는 이 값을 환경변수로 덮어쓸 수 있습니다.
# 기본값은 infra/config/backend/application.properties가 정의한 Docker gardendoctor DB가 아니라
# 일반적인 로컬 테스트 DB를 바라봅니다.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gardendoctor_test?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=1000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# 테스트 Redis 기본값입니다. 통합 테스트 profile이 Docker Redis 값으로 덮어쓸 수 있습니다.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# 실제 OAuth provider credentials 없이도 Spring context가 뜨도록 둔 테스트용 자리 표시자입니다.
spring.security.oauth2.client.registration.google.client-id=local-google-client-id
spring.security.oauth2.client.registration.google.client-secret=local-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.kakao.client-id=local-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=local-kakao-client-secret
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.registration.naver.client-id=local-naver-client-id
spring.security.oauth2.client.registration.naver.client-secret=local-naver-client-secret
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# 테스트 전용 JWT와 외부 서비스 자리 표시자입니다.
jwt.access-secret=local-test-access-secret-key-local-test-access-123456
jwt.refresh-secret=local-test-refresh-secret-key-local-test-refresh-123456
jwt.expiration=3600000
jwt.refresh-expiration=1209600000

python.server.url=http://localhost:8000

cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=gardendoctor-test

firebase.enabled=false
firebase.service-account.path=classpath:test-firebase-service-account.json

kakao.api.key=test-kakao-key

app.init.seed-data.enabled=${APP_INIT_SEED_DATA_ENABLED:false}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# OpenAPI/컨텍스트 테스트가 메일을 보내지 않고 비밀번호 재설정 빈을 생성할 때 사용하는 테스트 URL입니다.
app.auth.password-reset.confirm-url=http://localhost:3000/password-reset
