# DB 없이 전체 Spring context/OpenAPI를 검증하는 두 테스트 전용 profile입니다.
# Docker integration profile에는 상속되지 않습니다.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# DB 없는 context에서는 명시 dialect가 필수이므로 해당 Hibernate 안내만 숨깁니다.
# 실제 JDBC를 사용하는 기본/integration 설정의 deprecation 로그는 그대로 유지됩니다.
logging.level.org.hibernate.orm.deprecation=ERROR
