# Spring Boot 기본 실행 설정입니다. 이 파일이 Backend runtime 설정의 단일 원본입니다.
# Gradle resource sourceSet과 Docker build가 이 위치를 직접 사용합니다.
# ${ENV_NAME:default} 형식은 먼저 프로세스 환경변수를 읽고,
# 해당 환경변수가 없을 때만 ':' 뒤의 로컬 기본값을 사용합니다.
# DB password, OAuth secret, JWT secret, AWS credential, 외부 API key처럼
# 민감하거나 오용 위험이 있는 값은 fallback을 두지 않고 .env/환경변수에서만 받습니다.

# Redis는 Repository 추상화가 아니라 StringRedisTemplate로만 사용합니다.
# JPA repository를 Redis 후보로 다시 스캔하지 않도록 repository 자동 구성을 끕니다.
spring.data.redis.repositories.enabled=false

# Spring이 읽는 datasource URL입니다. 여기의 포트는 Docker가 호스트에 노출한
# 포트이거나 같은 역할의 로컬 MySQL 포트입니다. MySQL 컨테이너 내부 포트는
# 여전히 3306입니다.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/gardendoctor?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gardendoctor}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=1000

# 로컬 스키마 생성 방식은 환경변수로 조절합니다. bootRun에서는 update를 쓸 수 있고,
# 설정에 남는 기본값은 더 보수적인 none으로 둡니다.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
# 영속성 컨텍스트 접근을 service transaction 경계 안으로 제한합니다.
spring.jpa.open-in-view=false

# Spring이 읽는 Redis 접속 값입니다. infra/compose.yaml 기준 Redis는
# localhost:6379로 노출됩니다.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# 로컬 개발용 메일 기본값입니다. 인증 없는 localhost 메일 서버를 가정합니다.
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT_MS:3000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_READ_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT_MS:5000}

# UserPlant care scheduler는 기본 비활성화합니다. 여러 인스턴스에서는 MySQL advisory lock으로
# 한 인스턴스만 실행합니다. batch-size는 사용자 ID keyset 조회와 Notification/Outbox 저장에서
# 한 청크로 처리할 최대 사용자 수이며, 결정적 event_key가 재실행 중복을 방지합니다.
app.userplant.care-scheduler.enabled=${APP_USERPLANT_CARE_SCHEDULER_ENABLED:false}
app.userplant.care-scheduler.zone=${APP_USERPLANT_CARE_SCHEDULER_ZONE:Asia/Seoul}
app.userplant.care-scheduler.reset-cron=${APP_USERPLANT_CARE_SCHEDULER_RESET_CRON:0 0 0 * * *}
app.userplant.care-scheduler.daily-cron=${APP_USERPLANT_CARE_SCHEDULER_DAILY_CRON:0 0 9 * * *}
app.userplant.care-scheduler.incomplete-cron=${APP_USERPLANT_CARE_SCHEDULER_INCOMPLETE_CRON:0 0 17 * * *}
app.userplant.care-scheduler.lock-wait-seconds=${APP_USERPLANT_CARE_SCHEDULER_LOCK_WAIT_SECONDS:0}
app.userplant.care-scheduler.batch-size=${APP_USERPLANT_CARE_SCHEDULER_BATCH_SIZE:1000}

# 로그인 실패 제한 설정입니다.
# Redis에 이메일 fingerprint별 실패 횟수를 TTL로 저장합니다. 원본 이메일은 key에 저장하지 않습니다.
app.auth.login-rate-limit.enabled=${APP_AUTH_LOGIN_RATE_LIMIT_ENABLED:true}
app.auth.login-rate-limit.max-failures=${APP_AUTH_LOGIN_RATE_LIMIT_MAX_FAILURES:5}
app.auth.login-rate-limit.failure-window-seconds=${APP_AUTH_LOGIN_RATE_LIMIT_FAILURE_WINDOW_SECONDS:900}
app.auth.login-rate-limit.lock-duration-seconds=${APP_AUTH_LOGIN_RATE_LIMIT_LOCK_DURATION_SECONDS:900}

# 비밀번호 재설정 토큰은 Redis에 SHA-256 fingerprint로만 저장합니다.
# confirm URL은 앱/웹이 토큰을 받아 새 비밀번호 입력 화면을 여는 주소입니다.
app.auth.password-reset.token-ttl-seconds=${APP_AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:900}
app.auth.password-reset.request-cooldown-seconds=${APP_AUTH_PASSWORD_RESET_REQUEST_COOLDOWN_SECONDS:60}
app.auth.password-reset.confirm-url=${APP_AUTH_PASSWORD_RESET_CONFIRM_URL:http://localhost:3000/reset-password}

# OAuth client credential은 이 파일에 fallback을 두지 않습니다.
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE:email,profile}

spring.security.oauth2.client.registration.kakao.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_AUTHENTICATION_METHOD:client_secret_post}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_AUTHORIZATION_GRANT_TYPE:authorization_code}
spring.security.oauth2.client.registration.kakao.redirect-uri=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}
spring.security.oauth2.client.registration.kakao.scope=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_SCOPE:profile_nickname,account_email}
spring.security.oauth2.client.registration.kakao.client-name=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_NAME:Kakao}

spring.security.oauth2.client.registration.naver.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.client-authentication-method=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_AUTHENTICATION_METHOD:client_secret_post}
spring.security.oauth2.client.registration.naver.authorization-grant-type=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_AUTHORIZATION_GRANT_TYPE:authorization_code}
spring.security.oauth2.client.registration.naver.redirect-uri=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_REDIRECT_URI:{baseUrl}/login/oauth2/code/naver}
spring.security.oauth2.client.registration.naver.scope=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_SCOPE:name,email}
spring.security.oauth2.client.registration.naver.client-name=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_NAME:Naver}

spring.security.oauth2.client.provider.kakao.authorization-uri=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_AUTHORIZATION_URI:https://kauth.kakao.com/oauth/authorize}
spring.security.oauth2.client.provider.kakao.token-uri=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
spring.security.oauth2.client.provider.kakao.user-info-uri=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
spring.security.oauth2.client.provider.kakao.user-name-attribute=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_NAME_ATTRIBUTE:id}

spring.security.oauth2.client.provider.naver.authorization-uri=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_AUTHORIZATION_URI:https://nid.naver.com/oauth2.0/authorize}
spring.security.oauth2.client.provider.naver.token-uri=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_TOKEN_URI:https://nid.naver.com/oauth2.0/token}
spring.security.oauth2.client.provider.naver.user-info-uri=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_USER_INFO_URI:https://openapi.naver.com/v1/nid/me}
spring.security.oauth2.client.provider.naver.user-name-attribute=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_NAVER_USER_NAME_ATTRIBUTE:response}

# Access/Refresh JWT key는 약한 기본값으로 기동되지 않도록 환경변수에서만 받고,
# 서로 다른 32바이트 이상의 값을 사용합니다.
jwt.access-secret=${JWT_ACCESS_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:1209600000}

# Python AI 서버를 호출하는 기능에서 사용하는 선택적 엔드포인트입니다.
python.server.url=${PYTHON_SERVER_URL:http://localhost:8000}
python.connect-timeout-ms=${PYTHON_CONNECT_TIMEOUT_MS:2000}
python.response-timeout-ms=${PYTHON_RESPONSE_TIMEOUT_MS:15000}
python.request-timeout-ms=${PYTHON_REQUEST_TIMEOUT_MS:15000}

# Chat 삭제는 DB outbox에 먼저 기록하고 worker가 Python session을 재시도 가능하게 삭제합니다.
app.chat.deletion-worker.enabled=${APP_CHAT_DELETION_WORKER_ENABLED:false}
app.chat.deletion-worker.fixed-delay-ms=${APP_CHAT_DELETION_WORKER_FIXED_DELAY_MS:10000}
app.chat.deletion-worker.batch-size=${APP_CHAT_DELETION_WORKER_BATCH_SIZE:50}
app.chat.deletion-worker.max-attempts=${APP_CHAT_DELETION_WORKER_MAX_ATTEMPTS:5}
app.chat.deletion-worker.lock-timeout-minutes=${APP_CHAT_DELETION_WORKER_LOCK_TIMEOUT_MINUTES:10}

app.photo-analysis.request-cooldown-seconds=${APP_PHOTO_ANALYSIS_REQUEST_COOLDOWN_SECONDS:10}

# AWS credential은 이 파일에 fallback을 두지 않습니다.
cloud.aws.credentials.access-key=${CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${CLOUD_AWS_CREDENTIALS_SECRET_KEY}
cloud.aws.region.static=${CLOUD_AWS_REGION_STATIC:ap-northeast-2}
cloud.aws.s3.bucket=${CLOUD_AWS_S3_BUCKET:gardendoctor-local}

firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account.path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# 공지사항 및 개인 알림 FCM outbox worker 설정입니다.
# Spring이 읽는 값이고, 기본값은 false라 로컬에서 Firebase 키 없이 bootRun해도
# 외부 FCM 발송 worker가 돌지 않습니다. 실제 발송을 확인할 때만 .env/환경변수에서
# APP_FCM_OUTBOX_WORKER_ENABLED=true로 켭니다. batch-size는 FCM sendEach 제한에 맞춰
# 최대 500이며, 한 scheduler 실행에서 max-batches-per-run만큼 연속으로 backlog를 비웁니다.
app.fcm.outbox.worker.enabled=${APP_FCM_OUTBOX_WORKER_ENABLED:false}
app.fcm.outbox.worker.fixed-delay-ms=${APP_FCM_OUTBOX_WORKER_FIXED_DELAY_MS:1000}
app.fcm.outbox.worker.batch-size=${APP_FCM_OUTBOX_WORKER_BATCH_SIZE:500}
app.fcm.outbox.worker.max-batches-per-run=${APP_FCM_OUTBOX_WORKER_MAX_BATCHES_PER_RUN:20}
app.fcm.outbox.worker.max-attempts=${APP_FCM_OUTBOX_WORKER_MAX_ATTEMPTS:5}
app.fcm.outbox.worker.lock-timeout-minutes=${APP_FCM_OUTBOX_WORKER_LOCK_TIMEOUT_MINUTES:10}

kakao.api.key=${KAKAO_API_KEY}

app.init.seed-data.enabled=${APP_INIT_SEED_DATA_ENABLED:false}

# infra/scripts/backend/schema-bootstrap.sh의 1회 실행에서만 true로 설정합니다.
# 전체 application context와 schema가 정상 초기화된 뒤 프로세스를 성공 코드로 종료합니다.
app.schema-bootstrap.enabled=${APP_SCHEMA_BOOTSTRAP_ENABLED:false}

# FK를 물리 constraint 대신 identifier reference로 관리하는 정책의 운영 진단 토글입니다.
# 기본값은 false라 local health endpoint와 scheduler에 추가 DB scan을 만들지 않습니다.
# 켜면 orphan count만 노출/로그하고 자동 cleanup은 하지 않습니다.
app.integrity.identifier-reference.health.enabled=${APP_INTEGRITY_IDENTIFIER_REFERENCE_HEALTH_ENABLED:false}
app.integrity.identifier-reference.monitor.enabled=${APP_INTEGRITY_IDENTIFIER_REFERENCE_MONITOR_ENABLED:false}
app.integrity.identifier-reference.monitor.cron=${APP_INTEGRITY_IDENTIFIER_REFERENCE_MONITOR_CRON:0 0 3 * * *}

# bootRun에서 사용하는 내장 Tomcat HTTP 포트입니다. MySQL/Redis 포트와 별개입니다.
server.port=${SERVER_PORT:8080}

# 로컬 Actuator health endpoint 설정입니다.
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=${MANAGEMENT_HEALTH_PROBES_ENABLED:true}
management.health.mail.enabled=false
