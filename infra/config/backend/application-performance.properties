# performance profile 로컬 설정입니다.
# profile을 활성화할 때만 Gradle의 공용 infra resource sourceSet에서 로드됩니다.
# performance profile로 앱을 실행할 때만 Prometheus endpoint를 노출합니다.
# 운영에서는 management network 또는 별도 인증 경계 없이 이 profile을 켜지 않습니다.
management.endpoints.web.exposure.include=health,info,prometheus

# HTTP 요청 latency를 Prometheus histogram으로 내보내 p95/p99를 계산할 수 있게 합니다.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.minimum-expected-value.http.server.requests=1ms
management.metrics.distribution.maximum-expected-value.http.server.requests=10s
management.metrics.distribution.slo.http.server.requests=50ms,100ms,250ms,500ms,1s,2s

# 여러 애플리케이션/환경의 metric이 섞여도 식별할 수 있는 공통 label입니다.
management.metrics.tags.application=gardendoctor-backend
management.metrics.tags.environment=local-performance
