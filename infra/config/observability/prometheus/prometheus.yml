# Managed by infra/compose.yaml.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gardendoctor-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]

  - job_name: gardendoctor-mysql
    static_configs:
      - targets: ["mysqld-exporter:9104"]
